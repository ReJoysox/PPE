<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard PRO | AI Monitor</title>
    <!-- Используем самую стабильную версию библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --s: #22c55e; --d: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Стили боковой панели (Streamlit style) */
        .sidebar { width: 280px; background: #161e2e; padding: 25px; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--p); margin: 0; }
        .sidebar p { font-size: 0.7rem; color: #64748b; margin-bottom: 30px; }
        
        .control-group { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input[type=range] { width: 100%; margin-top: 10px; cursor: pointer; }

        /* Основной экран */
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .card { background: var(--card); width: 100%; max-width: 720px; padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #0f172a; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--p); color: white; }

        #monitor { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #334155; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }

        /* Загрузка фото */
        .upload-zone { border: 2px dashed #334155; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; margin-top: 10px; }
        .upload-zone:hover { border-color: var(--p); }

        /* Счетчики */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 720px; margin-top: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--p); }
        .stat-val { font-size: 2.2rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }

        #btn-action { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #log-status { font-size: 0.7rem; color: #475569; margin-top: 10px; text-align: center; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>SafeGuard PRO</h2>
    <p>v6.2 | YOLOv8 ONNX Runtime</p>
    
    <div class="control-group">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem">
            <span>Чувствительность</span>
            <span id="conf-val" style="color:var(--p)">45%</span>
        </div>
        <input type="range" id="conf-range" min="10" max="95" value="45">
    </div>

    <div style="margin-top: auto; color: #94a3b8; font-size: 0.7rem;">
        Статус: <span id="status-text">Загрузка...</span>
    </div>
</div>

<div class="main">
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" id="mode-live">📷 КАМЕРА</button>
            <button class="tab-btn" id="mode-photo">📁 ФОТО</button>
        </div>

        <div id="monitor">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="live-controls">
            <button id="btn-action">ВКЛЮЧИТЬ МОНИТОРИНГ</button>
        </div>

        <div id="photo-controls" style="display:none">
            <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                <strong>Нажмите для выбора фотографии</strong>
                <input type="file" id="file-input" accept="image/*">
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card" style="border-color: var(--s)">
            <span id="count-safe" class="stat-val" style="color:var(--s)">0</span>
            <span class="stat-label">В безопасности</span>
        </div>
        <div class="stat-card" style="border-color: var(--d)">
            <span id="count-bad" class="stat-val" style="color:var(--d)">0</span>
            <span class="stat-label">Нарушения</span>
        </div>
    </div>
    
    <div id="log-status">Подготовка системы...</div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status-text');
    const logStatus = document.getElementById('log-status');
    const confRange = document.getElementById('conf-range');
    const confValLabel = document.getElementById('conf-val');

    let session;
    let isLive = false;
    // Базовые классы. Если в модели другой порядок, они просто переименуются
    const labels = ["Helmet", "No-Helmet", "No-Vest", "Person", "Vest"];

    // 1. ЗАГРУЗКА МОДЕЛИ
    async function init() {
        try {
            logStatus.innerText = "Скачивание модели best.onnx...";
            session = await ort.InferenceSession.create('./best.onnx', { 
                executionProviders: ['wasm'], 
                graphOptimizationLevel: 'all' 
            });
            statusText.innerText = "ГОТОВ";
            statusText.style.color = "#22c55e";
            logStatus.innerText = "Система ИИ активирована. Нажмите кнопку запуска.";
        } catch (e) {
            logStatus.innerText = "ОШИБКА: Файл best.onnx не найден в корне GitHub репозитория!";
            statusText.innerText = "ОШИБКА";
            console.error(e);
        }
    }

    // 2. ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ
    document.getElementById('mode-live').onclick = () => switchMode(true);
    document.getElementById('mode-photo').onclick = () => switchMode(false);

    function switchMode(live) {
        isLive = live;
        document.getElementById('mode-live').classList.toggle('active', live);
        document.getElementById('mode-photo').classList.toggle('active', !live);
        document.getElementById('live-controls').style.display = live ? 'block' : 'none';
        document.getElementById('photo-controls').style.display = live ? 'none' : 'block';
        if (!live && video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // 3. ОБРАБОТКА КАМЕРЫ
    document.getElementById('btn-action').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            processLoop();
        };
    };

    async function processLoop() {
        if (!isLive) return;
        await runInference(video);
        requestAnimationFrame(processLoop);
    }

    // 4. ОБРАБОТКА ФОТО
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = async () => {
            canvas.width = img.width;
            canvas.height = img.height;
            logStatus.innerText = "Анализ фотографии...";
            await runInference(img);
            logStatus.innerText = "Анализ завершен.";
        };
    };

    // 5. ДВИЖОК ИИ
    async function runInference(source) {
        if (!session) return;

        // Предподготовка (640x640)
        const [w, h] = [640, 640];
        const inputCanvas = document.createElement('canvas');
        inputCanvas.width = w; inputCanvas.height = h;
        const iCtx = inputCanvas.getContext('2d');
        iCtx.drawImage(source, 0, 0, w, h);
        const imgData = iCtx.getImageData(0, 0, w, h).data;

        const input = new Float32Array(3 * w * h);
        for (let i = 0; i < w * h; i++) {
            input[i] = imgData[i * 4] / 255.0; // R
            input[i + 409600] = imgData[i * 4 + 1] / 255.0; // G
            input[i + 819200] = imgData[i * 4 + 2] / 255.0; // B
        }

        const tensor = new ort.Tensor('float32', input, [1, 3, w, h]);
        const output = await session.run({ [session.inputNames[0]]: tensor });
        const data = output[session.outputNames[0]].data;

        draw(data);
    }

    function draw(data) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (isLive) ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        // Если это фото, оно уже нарисовано фоном в runInference

        let safe = 0; let bad = 0;
        const confThreshold = parseInt(confRange.value) / 100;
        
        // YOLOv8 Output parsing [1, 4+classes, 8400]
        const numClasses = session.outputNames[0].includes('output0') ? (data.length / 8400) - 4 : 5;

        for (let i = 0; i < 8400; i++) {
            let maxProb = 0; let classId = -1;
            for (let c = 0; c < numClasses; c++) {
                const prob = data[8400 * (c + 4) + i];
                if (prob > maxProb) { maxProb = prob; classId = c; }
            }

            if (maxProb > confThreshold) {
                const cx = data[i]; 
                const cy = data[8400 + i];
                const w = data[8400 * 2 + i]; 
                const h = data[8400 * 3 + i];

                const x = (cx - w/2) * (canvas.width / 640);
                const y = (cy - h/2) * (canvas.height / 640);
                const width = w * (canvas.width / 640);
                const height = h * (canvas.height / 640);

                const label = labels[classId] || "Object";
                if (label === "Person") {
                    ctx.strokeStyle = "rgba(255,255,255,0.5)";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, width, height);
                    continue;
                }

                const isViolation = label.toLowerCase().includes("no");
                const color = isViolation ? "#ef4444" : "#22c55e";
                if (isViolation) bad++; else safe++;

                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, width, height);
                
                ctx.fillStyle = color;
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(`${label.toUpperCase()} ${Math.round(maxProb * 100)}%`, x, y - 10);
            }
        }

        // Обновляем статистику
        document.getElementById('count-safe').innerText = Math.min(safe, 15);
        document.getElementById('count-bad').innerText = Math.min(bad, 15);
    }

    confRange.oninput = () => confValLabel.innerText = confRange.value + "%";
    init();
</script>
</body>
</html>
