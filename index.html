<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard ИИ | Industrial Safety</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --s: #22c55e; --d: #ef4444; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; overflow: hidden; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: #161e2e; padding: 25px; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--p); font-size: 1.5rem; margin: 0 0 5px; }
        .sidebar p { font-size: 0.8rem; color: #94a3b8; margin-bottom: 30px; }
        
        .control-group { margin-bottom: 25px; }
        .control-label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 10px; }
        input[type=range] { width: 100%; cursor: pointer; }

        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); width: 100%; max-width: 800px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #0f172a; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; color: #94a3b8; background: none; cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .tab-btn.active { background: var(--card); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Viewport */
        #monitor { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #334155; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { display: none; }

        /* Upload Area */
        .upload-box { border: 2px dashed #334155; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .upload-box:hover { border-color: var(--p); background: rgba(59, 130, 246, 0.05); }
        #file-name { margin-top: 10px; font-size: 0.8rem; color: var(--p); }

        /* Stats */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; margin-top: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--p); }
        .stat-card.safe { border-color: var(--s); }
        .stat-card.danger { border-color: var(--d); }
        .stat-val { font-size: 2.5rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .btn-start { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        .btn-start:hover { filter: brightness(1.1); }

        #status-indicator { font-size: 0.75rem; text-align: center; margin-top: 15px; color: #64748b; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>SafeGuard PRO</h2>
    <p>Интеллектуальный контроль СИЗ</p>
    
    <div class="control-group">
        <div class="control-label">
            <span>Чувствительность</span>
            <span id="conf-val" style="color: var(--p)">45%</span>
        </div>
        <input type="range" id="conf-range" min="10" max="95" value="45">
    </div>

    <div style="margin-top: auto;">
        <div id="status-indicator">Загрузка модели best.onnx...</div>
    </div>
</div>

<div class="main">
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" id="btn-live">📷 РЕЖИМ ВИДЕО</button>
            <button class="tab-btn" id="btn-photo">📁 АНАЛИЗ ФОТО</button>
        </div>

        <div id="monitor">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <!-- Live Controls -->
        <div id="live-ui">
            <button class="btn-start" id="start-stream">ЗАПУСТИТЬ МОНИТОРИНГ</button>
        </div>

        <!-- Photo Controls -->
        <div id="photo-ui" style="display:none">
            <div class="upload-box" onclick="document.getElementById('file-input').click()">
                <div style="font-size: 2rem; margin-bottom: 10px;">📤</div>
                <strong>Нажмите для загрузки фото</strong>
                <div style="font-size: 0.8rem; color: #64748b; margin-top: 5px;">Поддерживаются JPG, PNG</div>
                <div id="file-name"></div>
                <input type="file" id="file-input" accept="image/*">
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card safe">
            <span id="count-safe" class="stat-val">0</span>
            <span class="stat-label">В безопасности</span>
        </div>
        <div class="stat-card danger">
            <span id="count-bad" class="stat-val">0</span>
            <span class="stat-label">Нарушения</span>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status-indicator');
    const confRange = document.getElementById('conf-range');
    const confValText = document.getElementById('conf-val');
    
    let session;
    let isLive = false;
    // Твои классы (проверь порядок в Roboflow если будут путаться)
    const labels = ["Helmet", "No-Helmet", "No-Vest", "Person", "Vest"];

    async function init() {
        try {
            // Оптимизированная загрузка
            session = await ort.InferenceSession.create('./best.onnx', { 
                executionProviders: ['wasm'],
                graphOptimizationLevel: 'all'
            });
            status.innerText = "✅ Модель YOLOv8 загружена. Система готова.";
            status.style.color = "#22c55e";
        } catch (e) {
            status.innerText = "❌ Ошибка: Файл best.onnx не найден!";
            status.style.color = "#ef4444";
        }
    }

    // Вкладки
    document.getElementById('btn-live').onclick = () => setMode(true);
    document.getElementById('btn-photo').onclick = () => setMode(false);

    function setMode(live) {
        isLive = live;
        document.getElementById('btn-live').classList.toggle('active', live);
        document.getElementById('btn-photo').classList.toggle('active', !live);
        document.getElementById('live-ui').style.display = live ? 'block' : 'none';
        document.getElementById('photo-ui').style.display = live ? 'none' : 'block';
        if (!live && video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    }

    // Камера
    document.getElementById('start-stream').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            renderLoop();
        };
    };

    async function renderLoop() {
        if (!isLive) return;
        await runInference(video);
        // Ограничиваем до 10-12 кадров в секунду чтобы не лагало
        setTimeout(() => requestAnimationFrame(renderLoop), 80);
    }

    // Фото
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('file-name').innerText = file.name;
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = async () => {
            canvas.width = img.width;
            canvas.height = img.height;
            await runInference(img);
        };
    };

    // Движок
    async function runInference(source) {
        if (!session) return;

        const [w, h] = [640, 640];
        const inputCanvas = document.createElement('canvas');
        inputCanvas.width = w; inputCanvas.height = h;
        const iCtx = inputCanvas.getContext('2d');
        iCtx.drawImage(source, 0, 0, w, h);
        const data = iCtx.getImageData(0, 0, w, h).data;

        // Быстрая нормализация
        const float32Data = new Float32Array(3 * w * h);
        for (let i = 0; i < w * h; i++) {
            float32Data[i] = data[i * 4] / 255.0;
            float32Data[i + w * h] = data[i * 4 + 1] / 255.0;
            float32Data[i + 2 * w * h] = data[i * 4 + 2] / 255.0;
        }

        const tensor = new ort.Tensor('float32', float32Data, [1, 3, w, h]);
        const outputs = await session.run({ [session.inputNames[0]]: tensor });
        const output = outputs[session.outputNames[0]].data;

        draw(output, source);
    }

    function draw(data, source) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(source, 0, 0, canvas.width, canvas.height);

        let safe = 0; let bad = 0;
        const boxes = [];
        const threshold = parseInt(confRange.value) / 100;

        for (let i = 0; i < 8400; i++) {
            let maxProb = 0; let classId = -1;
            for (let c = 0; c < labels.length; c++) {
                const prob = data[8400 * (c + 4) + i];
                if (prob > maxProb) { maxProb = prob; classId = c; }
            }

            if (maxProb > threshold) {
                const cx = data[i]; const cy = data[8400+i];
                const w = data[8400*2+i]; const h = data[8400*3+i];
                boxes.push({
                    x: (cx - w/2) * (canvas.width / 640),
                    y: (cy - h/2) * (canvas.height / 640),
                    w: w * (canvas.width / 640),
                    h: h * (canvas.height / 640),
                    prob: maxProb, classId
                });
            }
        }

        // Фильтрация дублей (NMS)
        const final = [];
        boxes.sort((a,b) => b.prob - a.prob);
        boxes.forEach(b => {
            if (!final.some(f => Math.abs(f.x - b.x) < 30 && Math.abs(f.y - b.y) < 30)) final.push(b);
        });

        final.forEach(box => {
            const label = labels[box.classId];
            if (label === "Person") return; // Скрываем подпись "Человек"

            const isBad = label.toLowerCase().includes("no");
            const color = isBad ? "#ef4444" : "#22c55e";
            if (isBad) bad++; else safe++;

            ctx.strokeStyle = color; ctx.lineWidth = 4;
            ctx.strokeRect(box.x, box.y, box.w, box.h);
            
            // Подпись в процентах
            ctx.fillStyle = color;
            ctx.font = "bold 14px sans-serif";
            const txt = `${label.toUpperCase()} ${Math.round(box.prob*100)}%`;
            ctx.fillText(txt, box.x, box.y > 20 ? box.y - 10 : 20);
            
            if (isBad) {
                ctx.fillStyle = "rgba(239, 68, 68, 0.2)";
                ctx.fillRect(box.x, box.y, box.w, box.h * 0.25); // Выделяем голову красным
            }
        });

        document.getElementById('count-safe').innerText = safe;
        document.getElementById('count-bad').innerText = bad;
    }

    confRange.oninput = () => confValText.innerText = confRange.value + "%";
    init();
</script>
</body>
</html>
