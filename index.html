<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard ИИ | Контроль СИЗ</title>
    <!-- Подключаем ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --s: #22c55e; --d: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 900px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        h1 { color: var(--p); margin: 0 0 15px; text-align: center; }
        
        /* Экран */
        #monitor { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #334155; display: flex; justify-content: center; align-items: center; min-height: 480px; }
        canvas { max-width: 100%; max-height: 600px; display: block; }
        video { display: none; }

        /* Кнопки */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-live { background: var(--p); }
        .btn-photo { background: #8b5cf6; text-align: center; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Настройки */
        .settings { background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #334155; }
        .settings label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 10px; }
        input[type=range] { width: 100%; cursor: pointer; }

        /* Статистика */
        .stats { display: flex; justify-content: space-around; background: #0f172a; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #334155; }
        .stat-item { text-align: center; flex: 1; }
        .stat-val { display: block; font-size: 2rem; font-weight: bold; }
        
        #status { text-align: center; color: #38bdf8; font-weight: bold; margin-bottom: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ SafeGuard ИИ v8.0</h1>
    <div id="status">Загрузка файла best.onnx...</div>

    <div class="settings">
        <label>
            <span>Чувствительность ИИ:</span>
            <span id="conf-val" style="color:var(--p); font-weight:bold;">30%</span>
        </label>
        <input type="range" id="conf-range" min="10" max="90" step="5" value="30">
        <div style="font-size: 0.7rem; color: #64748b; margin-top: 5px;">Двигайте вправо, если появляется много лишних рамок.</div>
    </div>

    <div id="monitor">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn btn-live" onclick="startCamera()">🎥 ВКЛЮЧИТЬ КАМЕРУ</button>
        <label class="btn btn-photo" style="display:flex; align-items:center; justify-content:center;">
            📁 ЗАГРУЗИТЬ ФОТО
            <input type="file" id="file-input" accept="image/*">
        </label>
    </div>

    <div class="stats">
        <div class="stat-item" style="border-right: 2px solid #1e293b;">
            <span style="color:#94a3b8; font-size: 0.8rem;">С СИЗ (В ЗАЩИТЕ)</span>
            <span id="count-safe" class="stat-val" style="color:var(--s)">0</span>
        </div>
        <div class="stat-item">
            <span style="color:#94a3b8; font-size: 0.8rem;">БЕЗ СИЗ (НАРУШИТЕЛИ)</span>
            <span id="count-bad" class="stat-val" style="color:var(--d)">0</span>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const confRange = document.getElementById('conf-range');
    const confValLabel = document.getElementById('conf-val');

    let session;
    let isLive = false;
    
    // Классы, которые мы ищем.
    const labels = ["Helmet", "No-Helmet", "No-Vest", "Person", "Vest", "Head"];

    // 1. ЗАГРУЗКА МОДЕЛИ
    async function init() {
        try {
            session = await ort.InferenceSession.create('./best.onnx', { executionProviders: ['wasm'] });
            status.innerText = "✅ МОДЕЛЬ ЗАГРУЖЕНА. ГОТОВ К РАБОТЕ.";
            status.style.color = "#22c55e";
        } catch (e) {
            console.error(e);
            status.innerText = "❌ ОШИБКА: Файл best.onnx не найден!";
            status.style.color = "#ef4444";
        }
    }

    // 2. КАМЕРА
    async function startCamera() {
        if (!session) return alert("Подождите, модель еще загружается!");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            isLive = true;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                processVideoLoop();
            };
        } catch (e) { alert("Ошибка доступа к камере."); }
    }

    async function processVideoLoop() {
        if (!isLive) return;
        await runInference(video);
        requestAnimationFrame(processVideoLoop);
    }

    // 3. ФОТО
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        isLive = false;
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        
        status.innerText = "Анализ фотографии...";
        status.style.color = "#38bdf8";

        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = async () => {
            canvas.width = img.width;
            canvas.height = img.height;
            await runInference(img);
            status.innerText = "✅ АНАЛИЗ ЗАВЕРШЕН";
            status.style.color = "#22c55e";
        };
    };

    // ФУНКЦИЯ ДЛЯ ПРОЦЕНТОВ (Исправляет баг с 200%)
    function sigmoid(x) {
        return 1 / (1 + Math.exp(-x));
    }

    // 4. ДВИЖОК НЕЙРОСЕТИ
    async function runInference(source) {
        if (!session) return;

        const [w, h] = [640, 640];
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(source, 0, 0, w, h);
        const imgData = tCtx.getImageData(0, 0, w, h).data;

        // Превращаем картинку в тензор
        const input = new Float32Array(3 * w * h);
        for (let i = 0; i < w * h; i++) {
            input[i] = imgData[i * 4] / 255.0; // R
            input[i + w*h] = imgData[i * 4 + 1] / 255.0; // G
            input[i + 2*w*h] = imgData[i * 4 + 2] / 255.0; // B
        }

        const tensor = new ort.Tensor('float32', input, [1, 3, w, h]);
        const outputs = await session.run({ [session.inputNames[0]]: tensor });
        const output = outputs[session.outputNames[0]];

        parseAndDraw(output.data, output.dims, source);
    }

    // 5. РАСПОЗНАВАНИЕ И ОТРИСОВКА
    function parseAndDraw(data, dims, source) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(source, 0, 0, canvas.width, canvas.height);

        const threshold = parseInt(confRange.value) / 100;
        let boxes = [];

        let numAnchors = dims[2]; // Обычно 8400
        let numClasses = dims[1] - 4; 

        // Ищем все возможные рамки
        for (let i = 0; i < numAnchors; i++) {
            let maxProb = 0;
            let classId = -1;

            for (let c = 0; c < numClasses; c++) {
                // Применяем сигмоиду, чтобы числа стали процентами от 0 до 1
                let raw_val = data[(4 + c) * numAnchors + i];
                let prob = sigmoid(raw_val); 

                if (prob > maxProb) { maxProb = prob; classId = c; }
            }

            if (maxProb > threshold) {
                let cx = data[0 * numAnchors + i];
                let cy = data[1 * numAnchors + i];
                let bw = data[2 * numAnchors + i];
                let bh = data[3 * numAnchors + i];

                let x = (cx - bw / 2) * (canvas.width / 640);
                let y = (cy - bh / 2) * (canvas.height / 640);
                let w = bw * (canvas.width / 640);
                let h = bh * (canvas.height / 640);

                boxes.push({ x, y, w, h, prob: maxProb, classId });
            }
        }

        // ЖЕСТКИЙ ФИЛЬТР (NMS) - УБИРАЕТ "КАШУ" ИЗ РАМОК
        boxes.sort((a, b) => b.prob - a.prob);
        const finalBoxes = [];
        while (boxes.length > 0) {
            const best = boxes.shift();
            finalBoxes.push(best);
            // Удаляем рамки, которые лежат друг на друге
            boxes = boxes.filter(box => iou(best, box) < 0.4);
        }

        let safeCount = 0;
        let badCount = 0;

        // Рисуем финальные красивые рамки
        finalBoxes.forEach(box => {
            const labelName = labels[box.classId] ? labels[box.classId] : `Объект`;
            const labelLower = labelName.toLowerCase();
            
            if (labelLower === "person" || labelLower === "human") return; // Прячем надпись "человек"

            const isBad = labelLower.includes("no");
            const color = isBad ? "#ef4444" : "#22c55e"; 
            const text = isBad ? "НАРУШИТЕЛЬ" : "В ЗАЩИТЕ";
            
            if (isBad) badCount++; else safeCount++;

            // Рисуем рамку
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.strokeRect(box.x, box.y, box.w, box.h);

            // Рисуем плашку
            ctx.fillStyle = color;
            ctx.fillRect(box.x, box.y > 25 ? box.y - 25 : 0, box.w, 25);
            
            // Пишем текст
            ctx.fillStyle = "white";
            ctx.font = "bold 14px Arial";
            ctx.fillText(`${text} (${Math.round(box.prob * 100)}%)`, box.x + 5, box.y > 25 ? box.y - 7 : 18);
        });

        // Обновляем статистику
        document.getElementById('count-safe').innerText = safeCount;
        document.getElementById('count-bad').innerText = badCount;
    }

    // Вспомогательная математика для фильтрации
    function iou(b1, b2) {
        const x1 = Math.max(b1.x, b2.x), y1 = Math.max(b1.y, b2.y);
        const x2 = Math.min(b1.x + b1.w, b2.x + b2.w), y2 = Math.min(b1.y + b1.h, b2.y + b2.h);
        const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
        const union = b1.w * b1.h + b2.w * b2.h - inter;
        return inter / union;
    }

    confRange.addEventListener('input', (e) => {
        confValLabel.innerText = e.target.value + '%';
    });

    init();
</script>
</body>
</html>
