<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard ИИ | ONNX</title>
    <!-- Подключаем библиотеку ONNX напрямую -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { max-width: 700px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #status { font-weight: bold; color: #3b82f6; margin-bottom: 10px; }
        #monitor { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #334155; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .btn { padding: 15px 30px; background: #3b82f6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛡️ SafeGuard ИИ: ONNX v6.0</h2>
    <div id="status">Загрузка нейросети... (проверьте интернет)</div>

    <div id="monitor">
        <video id="video" autoplay muted playsinline style="display:none"></video>
        <canvas id="canvas"></canvas>
    </div>

    <button class="btn" onclick="startCamera()">🎥 ЗАПУСТИТЬ КАМЕРУ</button>
</div>

<script>
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video');
    
    let session;

    // 1. ЗАГРУЗКА МОДЕЛИ
    async function init() {
        try {
            console.log("Попытка загрузки best.onnx...");
            // Загружаем модель. Файл должен лежать в той же папке, что и этот html
            session = await ort.InferenceSession.create('./best.onnx', { 
                executionProviders: ['wasm'], 
                graphOptimizationLevel: 'all' 
            });
            console.log("Модель загружена успешно!");
            status.innerText = "СИСТЕМА ГОТОВА";
            status.style.color = "#22c55e";
        } catch (e) {
            console.error("Ошибка инициализации:", e);
            status.innerText = "ОШИБКА: Файл best.onnx не найден или поврежден";
            status.style.color = "#ef4444";
        }
    }

    // 2. КАМЕРА
    async function startCamera() {
        if (!session) return alert("Дождитесь загрузки модели!");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.style.display = "block";
            requestAnimationFrame(detect);
        } catch (err) {
            alert("Ошибка камеры: " + err.message);
        }
    }

    // 3. ОБРАБОТКА КАДРА
    async function detect() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Превращаем кадр в тензор для YOLO (640x640)
        const input = await prepareInput(video);
        
        try {
            const outputs = await session.run({ images: input });
            const output = outputs.output0.data; // В YOLOv8 имя выхода обычно output0
            renderBoxes(output);
        } catch (err) {
            console.error("Ошибка инференса:", err);
        }

        requestAnimationFrame(detect);
    }

    async function prepareInput(source) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 640;
        tempCanvas.height = 640;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(source, 0, 0, 640, 640);
        const imgData = tCtx.getImageData(0, 0, 640, 640).data;
        
        const floatData = new Float32Array(3 * 640 * 640);
        for (let i = 0; i < 640 * 640; i++) {
            floatData[i] = imgData[i * 4] / 255.0;       // R
            floatData[i + 409600] = imgData[i * 4 + 1] / 255.0; // G
            floatData[i + 819200] = imgData[i * 4 + 2] / 255.0; // B
        }
        return new ort.Tensor('float32', floatData, [1, 3, 640, 640]);
    }

    function renderBoxes(data) {
        // Очистка и отрисовка только нужных рамок (Confidence > 0.5)
        for (let i = 0; i < 8400; i++) {
            let score = data[8400 * 4 + i]; // Берем вероятность первого класса (обычно Helmet)
            if (score > 0.5) {
                let cx = data[i] * (canvas.width / 640);
                let cy = data[8400 + i] * (canvas.height / 640);
                let w = data[8400 * 2 + i] * (canvas.width / 640);
                let h = data[8400 * 3 + i] * (canvas.height / 640);

                ctx.strokeStyle = "#22c55e";
                ctx.lineWidth = 3;
                ctx.strokeRect(cx - w/2, cy - h/2, w, h);
            }
        }
    }

    init();
</script>
</body>
</html>
