<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard PRO | Industrial AI</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --s: #22c55e; --d: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Стили боковой панели */
        .sidebar { width: 280px; background: #161e2e; padding: 20px; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--p); margin: 0; font-size: 1.4rem; }
        .sidebar p { font-size: 0.75rem; color: #64748b; margin-bottom: 30px; }
        .control-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; }
        #conf-val { color: var(--p); font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--p); }

        /* Основной контент */
        .main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); width: 100%; max-width: 800px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #0f172a; color: #94a3b8; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--p); color: white; }

        /* Монитор */
        #monitor { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #334155; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }

        /* Загрузка фото */
        .upload-area { border: 2px dashed #334155; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .upload-area:hover { border-color: var(--p); background: rgba(59, 130, 246, 0.05); }
        input[type="file"] { display: none; }

        /* Статистика */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 800px; margin-top: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--p); }
        .stat-val { display: block; font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }

        #btn-start { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        #status-bar { font-size: 0.7rem; color: #475569; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>SafeGuard PRO</h2>
    <p>Industrial Safety Monitor</p>
    
    <div class="control-group">
        <div class="control-label">
            <span>Чувствительность</span>
            <span id="conf-val">45%</span>
        </div>
        <input type="range" id="conf-range" min="10" max="95" value="45">
    </div>

    <div style="margin-top: auto;" id="status-bar">Загрузка нейросети best.onnx...</div>
</div>

<div class="main">
    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" id="tab-live">🎥 ВИДЕО</button>
            <button class="tab-btn" id="tab-photo">📁 ФОТО</button>
        </div>

        <div id="monitor">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="live-ui">
            <button id="btn-start">ЗАПУСТИТЬ КАМЕРУ</button>
        </div>

        <div id="photo-ui" style="display:none">
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <div style="font-size: 2rem;">📤</div>
                <strong>Нажмите для загрузки</strong>
                <div style="color: #64748b; font-size: 0.8rem;">JPG, PNG изображения</div>
                <input type="file" id="file-input" accept="image/*">
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card" style="border-color: var(--s)">
            <span id="count-safe" class="stat-val">0</span>
            <span class="stat-label">В безопасности</span>
        </div>
        <div class="stat-card" style="border-color: var(--d)">
            <span id="count-bad" class="stat-val">0</span>
            <span class="stat-label">Нарушения</span>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status-bar');
    const confRange = document.getElementById('conf-range');
    const confValText = document.getElementById('conf-val');
    
    let session;
    let isLive = false;
    // Порядок классов: Helmet, No-Helmet, No-Vest, Person, Vest
    const labels = ["Helmet", "No-Helmet", "No-Vest", "Person", "Vest"];

    async function init() {
        try {
            session = await ort.InferenceSession.create('./best.onnx', { executionProviders: ['wasm'] });
            status.innerText = "✅ Модель YOLOv8 готова";
            status.style.color = "#22c55e";
        } catch (e) {
            status.innerText = "❌ Ошибка: best.onnx не найден!";
            status.style.color = "#ef4444";
        }
    }

    // Переключение режимов
    document.getElementById('tab-live').onclick = () => switchMode(true);
    document.getElementById('tab-photo').onclick = () => switchMode(false);

    function switchMode(live) {
        isLive = live;
        document.getElementById('tab-live').classList.toggle('active', live);
        document.getElementById('tab-photo').classList.toggle('active', !live);
        document.getElementById('live-ui').style.display = live ? 'block' : 'none';
        document.getElementById('photo-ui').style.display = live ? 'none' : 'block';
        if (!live && video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    }

    // Камера
    document.getElementById('btn-start').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            loop();
        };
    };

    async function loop() {
        if (!isLive) return;
        await runAI(video);
        setTimeout(() => requestAnimationFrame(loop), 50); // ~20 FPS
    }

    // Файл
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = async () => {
            canvas.width = img.width;
            canvas.height = img.height;
            await runAI(img);
        };
    };

    // ДВИЖОК ИИ
    async function runAI(source) {
        if (!session) return;

        // Предобработка 640x640
        const [w, h] = [640, 640];
        const offscreen = document.createElement('canvas');
        offscreen.width = w; offscreen.height = h;
        const oCtx = offscreen.getContext('2d');
        oCtx.drawImage(source, 0, 0, w, h);
        const imgData = oCtx.getImageData(0, 0, w, h).data;

        const input = new Float32Array(3 * w * h);
        for (let i = 0; i < w * h; i++) {
            input[i] = imgData[i * 4] / 255.0; // R
            input[i + w*h] = imgData[i * 4 + 1] / 255.0; // G
            input[i + 2*w*h] = imgData[i * 4 + 2] / 255.0; // B
        }

        const tensor = new ort.Tensor('float32', input, [1, 3, w, h]);
        const output = await session.run({ [session.inputNames[0]]: tensor });
        const data = output[session.outputNames[0]].data;

        render(data, source);
    }

    function render(data, source) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(source, 0, 0, canvas.width, canvas.height);

        let safe = 0; let bad = 0;
        const conf = parseInt(confRange.value) / 100;
        const detections = [];

        // Разбор матрицы YOLOv8 [1, 9, 8400]
        for (let i = 0; i < 8400; i++) {
            let maxScore = 0; let id = -1;
            for (let c = 0; c < 5; c++) {
                let score = data[8400 * (c + 4) + i];
                if (score > maxScore) { maxScore = score; id = c; }
            }

            if (maxScore > conf) {
                detections.push({
                    x: (data[i] - data[8400*2+i]/2) * (canvas.width / 640),
                    y: (data[8400+i] - data[8400*3+i]/2) * (canvas.height / 640),
                    w: data[8400*2+i] * (canvas.width / 640),
                    h: data[8400*3+i] * (canvas.height / 640),
                    score: maxScore, classId: id
                });
            }
        }

        // Простой NMS
        const final = [];
        detections.sort((a,b) => b.score - a.score);
        detections.forEach(d => {
            if (!final.some(f => Math.abs(f.x - d.x) < 40 && Math.abs(f.y - d.y) < 40)) final.push(d);
        });

        final.forEach(d => {
            const label = labels[d.classId];
            if (label === "Person") return;

            const isBad = label.toLowerCase().includes("no");
            const color = isBad ? "#ef4444" : "#22c55e";
            if (isBad) bad++; else safe++;

            ctx.strokeStyle = color; ctx.lineWidth = 4;
            ctx.strokeRect(d.x, d.y, d.w, d.h);
            ctx.fillStyle = color;
            ctx.font = "bold 14px sans-serif";
            ctx.fillText(`${label.toUpperCase()} ${Math.round(d.score*100)}%`, d.x, d.y - 10);
        });

        document.getElementById('count-safe').innerText = safe;
        document.getElementById('count-bad').innerText = bad;
    }

    confRange.oninput = () => confValText.innerText = confRange.value + "%";
    init();
</script>
</body>
</html>
