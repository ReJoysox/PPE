<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard ИИ | Система Мониторинга</title>
    <!-- Основные библиотеки для работы ИИ -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --s: #22c55e; --d: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        /* Layout как в Streamlit */
        .app-container { display: grid; grid-template-columns: 260px 1fr; width: 100%; max-width: 1200px; }
        
        .sidebar { background: #161e2e; padding: 20px; border-right: 1px solid #334155; }
        .main-content { padding: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 700px; }
        
        /* Монитор */
        #monitor-wrapper { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #334155; line-height: 0; }
        canvas { width: 100%; height: auto; display: block; }
        video { display: none; }

        /* Кнопки и Табы */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #334155; border: none; color: white; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: var(--p); }
        
        .btn-main { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Статистика */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; width: 100%; }
        .stat-card { background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--p); }
        .stat-val { font-size: 2rem; font-weight: bold; display: block; }
        
        #status-msg { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- БОКОВАЯ ПАНЕЛЬ -->
    <div class="sidebar">
        <h2 style="color:var(--p)">SafeGuard PRO</h2>
        <p style="font-size: 0.8rem; color: #94a3b8;">Система на базе YOLOv8 ONNX</p>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">
        <label>Чувствительность:</label>
        <input type="range" id="conf-range" min="0.1" max="0.9" step="0.05" value="0.45" style="width:100%">
        <div style="text-align: center; margin-top: 5px;" id="conf-val">0.45</div>
    </div>

    <!-- ОСНОВНАЯ ЧАСТЬ -->
    <div class="main-content">
        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" id="mode-live">📷 Видео LIVE</button>
                <button class="tab-btn" id="mode-photo">📁 Загрузить фото</button>
            </div>

            <div id="monitor-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas"></canvas>
            </div>

            <div id="live-controls">
                <button class="btn-main" id="start-btn">ЗАПУСТИТЬ МОНИТОРИНГ</button>
            </div>

            <div id="photo-controls" style="display:none">
                <label class="btn-main" style="display:block; text-align:center; background:#8b5cf6">
                    ВЫБРАТЬ ФАЙЛ
                    <input type="file" id="file-input" accept="image/*">
                </label>
            </div>

            <div id="status-msg">Загрузка нейросети best.onnx...</div>
        </div>

        <!-- СТАТИСТИКА -->
        <div class="stats-grid">
            <div class="stat-card" style="border-color: var(--s);">
                <span class="stat-label">В ЗАЩИТЕ</span>
                <span id="count-safe" class="stat-val" style="color:var(--s)">0</span>
            </div>
            <div class="stat-card" style="border-color: var(--d);">
                <span class="stat-label">НАРУШЕНИЯ</span>
                <span id="count-bad" class="stat-val" style="color:var(--d)">0</span>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status-msg');
    const confRange = document.getElementById('conf-range');
    const confVal = document.getElementById('conf-val');

    let session;
    let isLive = false;
    let labels = ["Helmet", "No-Helmet", "No-Vest", "Person", "Vest"]; // Твои классы

    // 1. Инициализация ИИ
    async function init() {
        try {
            // Оптимизация для браузера
            const options = { executionProviders: ['wasm'], graphOptimizationLevel: 'all' };
            session = await ort.InferenceSession.create('./best.onnx', options);
            status.innerText = "✅ Нейросеть загружена. Система готова.";
            status.style.color = "#22c55e";
        } catch (e) {
            status.innerText = "❌ Ошибка: положите best.onnx в папку с index.html";
            status.style.color = "#ef4444";
            console.error(e);
        }
    }

    // 2. Переключение вкладок
    document.getElementById('mode-live').onclick = () => switchMode(true);
    document.getElementById('mode-photo').onclick = () => switchMode(false);

    function switchMode(live) {
        isLive = live;
        document.getElementById('mode-live').classList.toggle('active', live);
        document.getElementById('mode-photo').classList.toggle('active', !live);
        document.getElementById('live-controls').style.display = live ? 'block' : 'none';
        document.getElementById('photo-controls').style.display = live ? 'none' : 'block';
        if (!live) stopCamera();
    }

    // 3. Работа с камерой
    document.getElementById('start-btn').onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                detectLoop();
            };
        } catch (err) { alert("Нет доступа к камере"); }
    };

    function stopCamera() {
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    }

    async function detectLoop() {
        if (!isLive) return;
        await runInference(video);
        requestAnimationFrame(detectLoop);
    }

    // 4. Работа с фото
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
